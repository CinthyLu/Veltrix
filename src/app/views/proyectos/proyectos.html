<section class="max-w-7xl mx-auto px-6 py-12">
  <h1 class="text-3xl font-bold text-white mb-8">Nuestros Proyectos</h1>

  @if (proyectos$ | async; as list) {
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (proj of list; track proj.documentId) {
        <article class="bg-dark-surface border border-gray-700 rounded-xl overflow-hidden hover:border-neon-teal transition-all">
          <div class="p-6">
            <span class="text-xs font-mono text-neon-teal uppercase">{{ proj.tipo_de_proyecto }}</span>
            <h2 class="text-xl font-bold text-white mt-2">{{ proj.Project_Name }}</h2>
            <p class="text-gray-400 text-sm mt-3">{{ proj.Short_description }}</p>
            <div class="mt-4 flex gap-2">
              <a [href]="proj.Link_repository" target="_blank" class="text-xs text-gray-500 hover:text-white">GitHub</a>
              @if (proj.Link_demo) {
                <a [href]="proj.Link_demo" target="_blank" class="text-xs text-neon-cyan hover:text-white">Live Demo</a>
              }
            </div>
          </div>
        </article>
      }
    </div>
  } @else {
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (i of [1, 2, 3]; track i) {
        <article class="bg-dark-surface border border-gray-800 rounded-xl p-6 animate-pulse">
          <div class="h-4 w-24 bg-gray-700 rounded mb-4"></div>
          <div class="h-6 w-3/4 bg-gray-700 rounded mb-3"></div>
          <div class="h-16 w-full bg-gray-800 rounded"></div>
        </article>
      }
    </div>
  }
</section>
