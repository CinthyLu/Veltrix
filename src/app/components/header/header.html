<header class="sticky top-0 z-50 w-full border-b border-dark-surface/40 bg-dark-bg/85 backdrop-blur-md transition-all duration-300">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
    
    <a routerLink="/" class="flex items-center space-x-2 font-display text-xl font-extrabold tracking-widest text-white transition-all hover:text-neon-cyan">
      <span class="text-neon-cyan font-light">&lt;&gt;</span>
      <span>VELTRIX</span>
      <span class="text-xs font-mono font-medium text-neon-teal border border-neon-teal/30 px-1.5 py-0.5 rounded ml-2">STUDIO</span>
    </a>

    <nav class="hidden md:flex items-center space-x-8 font-mono text-sm tracking-wider">
      <a routerLink="/" routerLinkActive="text-neon-cyan border-neon-cyan" [routerLinkActiveOptions]="{exact: true}"
         class="py-2 border-b-2 border-transparent text-gray-400 hover:text-white transition-all">INICIO</a>

      <a routerLink="/programadores" routerLinkActive="text-neon-cyan border-neon-cyan"
         class="py-2 border-b-2 border-transparent text-gray-400 hover:text-white transition-all">PROGRAMADORES</a>

      <a routerLink="/proyectos" routerLinkActive="text-neon-cyan border-neon-cyan"
         class="py-2 border-b-2 border-transparent text-gray-400 hover:text-white transition-all">PROYECTOS</a>

      @if (currentUser$ | async; as user) {
        
        <a [routerLink]="user.isProgrammer ? ['/programador', user.programmerId] : '/proyectos'" 
           class="text-neon-cyan font-bold hover:text-white transition-all cursor-pointer">
           {{ user.name }}
        </a>

        @if (user.isProgrammer) {
          <a routerLink="/solicitudes" class="text-gray-400 hover:text-white border-l border-gray-800 pl-8">
            Mis Solicitudes
          </a>
        } @else {
          <a routerLink="/solicitudes" class="text-gray-400 hover:text-white border-l border-gray-800 pl-8">
            Consultoría
          </a>
        }

        <button (click)="logout()" class="px-4 py-1.5 border border-red-500/30 rounded text-red-400 hover:bg-red-500/10 text-xs uppercase">
          Salir
        </button>

      } @else {
        <a routerLink="/login" routerLinkActive="text-neon-cyan" class="px-5 py-2 border border-neon-cyan/30 rounded text-neon-cyan hover:bg-neon-cyan/10 text-xs uppercase">
            Iniciar Sesión
        </a>
      }
    </nav>
  </div>
</header>
